name: Laravel auto deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install composer
        run: composer install --no-dev --optimize-autoloader

      - name: Sync code from runner to server
        run: rsync -avz --exclude '.git' . /var/www/my-app/

      - name: Update Maria Database
        run: |
          cd /var/www/my-app
          php artisan migrate --force
