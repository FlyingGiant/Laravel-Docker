services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      APP_URL: http://192.168.1.205:8090
    ports:
      - "8090:8090"
    volumes:
      - ./beszel_data:/beszel_data
      - ./beszel_socket:/beszel_socket
    healthcheck:
      test: ['CMD', '/beszel', 'health', '--url', 'http://localhost:8090']
      interval: 120s
      start_period: 10s
      timeout: 5s

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    group_add:
      - "988"
    volumes:
      - ./beszel_agent_data:/var/lib/beszel-agent
      - ./beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: http://localhost:8090
      TOKEN: "997-2eb0d55582-10a3-5ea8cb1f1d"   # ← điền sau
      KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAVCmYwdketLIVrXu/H/1rWrPD05GQ665Z/aqMGZ1TN0"     # ← điền sau
    healthcheck:
      test: ['CMD', '/agent', 'health']
      interval: 120s
      start_period: 10s
      timeout: 5s


  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    pid: host
    network_mode: host
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - NETDATA_CLAIM_TOKEN=4d00WkL_M9AFek7fR9bosnDx4rJZYMaR_4bSgaxRJxHVq_Nto-B2-wsjfHR-BESn9XqES1lxi9hNqkw7_sxAtxhLIX5FBfdeUuZhID74QStBXv-vPE70ZcCrAXeq9ojw8TV-dog
      - NETDATA_CLAIM_URL=https://app.netdata.cloud
      - NETDATA_CLAIM_ROOMS=ed4f7b82-3bd5-4b34-bff3-665f57fb612c
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  netdataconfig:
  netdatalib:
  netdatacache:

      